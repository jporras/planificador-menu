quarkus.http.port=8080

%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:planificador;DB_CLOSE_DELAY=-1
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=sa
%dev.quarkus.hibernate-orm.database.generation=drop-and-create

quarkus.datasource.db-kind=oracle
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
quarkus.datasource.username=${DB_USERNAME:planificador}
quarkus.datasource.password=${DB_PASSWORD:Planificador123}
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

